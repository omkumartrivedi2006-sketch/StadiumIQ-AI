<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>StadiumIQ AI - Smart Stadium Assistant for FIFA World Cup 2026</title>
    <meta name="description" content="AI-powered stadium assistant for fans, staff, and organizers. Navigation, crowd management, accessibility, and real-time support." />
    
    <!-- PWA & Theme color -->
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:title" content="StadiumIQ AI - Smart Stadium Assistant for FIFA World Cup 2026" />
    <meta property="og:description" content="Enterprise-grade AI-powered stadium assistant for fans, staff, and organizers. Live navigation, crowd queue tracking, accessibility assistance, and instant help." />
    <meta property="og:image" content="/icon-512.svg" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StadiumIQ AI - FIFA World Cup 2026 Stadium Assistant" />
    <meta name="twitter:description" content="AI-powered live navigation, crowd tracking, and smart assistance." />
    <meta name="twitter:image" content="/icon-512.svg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "StadiumIQ AI",
        "operatingSystem": "All",
        "applicationCategory": "SportsApplication",
        "description": "Smart Stadium Assistant for FIFA World Cup 2026. Live navigation, crowd management, food order queues, and accessibility guidance.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        const endpoint = "%VITE_ANALYTICS_ENDPOINT%";
        const webId = "%VITE_ANALYTICS_WEBSITE_ID%";
        if (endpoint && webId && !endpoint.startsWith("%") && !webId.startsWith("%")) {
          const script = document.createElement("script");
          script.defer = true;
          script.src = `${endpoint}/umami`;
          script.setAttribute("data-website-id", webId);
          document.body.appendChild(script);
        }
      })();
    </script>
  </body>

</html>
